<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlphaBot — NAUB Student Assistant</title>
  <link rel="icon" href="{{ url_for('static', filename='img/alphabot_logo.png') }}" type="image/png">
  <style>
    /* Reset and global styles */
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        height:100vh;
        display:flex;
        flex-direction:column;
        color:#fff;
    }

    /* Header */
    .header {
        display:flex;
        align-items:center;
        justify-content:center;
        gap:10px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        padding: 20px;
        font-size:26px;
        font-weight:700;
        border-bottom:1px solid rgba(255,255,255,0.1);
        box-shadow:0 4px 30px rgba(0,0,0,0.3);
    }
    .header img { height:40px; }

    /* Chat container */
    .chat-area {
        flex:1;
        padding:20px;
        overflow-y:auto;
        display:flex;
        flex-direction:column;
        gap:12px;
        background: rgba(255,255,255,0.03);
        backdrop-filter: blur(8px);
        border-radius:15px;
        margin:15px;
        box-shadow:0 8px 25px rgba(0,0,0,0.4);
    }

    /* Message bubble */
    .message {
        display:flex;
        gap:10px;
        align-items:flex-start;
        max-width:75%;
        padding:10px 14px;
        border-radius:20px;
        font-size:15px;
        line-height:1.4;
        opacity:0;
        transform:translateY(20px);
        animation: fadeIn 0.3s forwards;
        backdrop-filter: blur(4px);
    }

    @keyframes fadeIn { to { opacity:1; transform:translateY(0); } }

    /* AlphaBot bubble */
    .bot {
        background: rgba(42,42,42,0.6);
        color:#eee;
        border-bottom-left-radius:2px;
        flex-direction:row;
    }

    /* User bubble */
    .user {
        background: rgba(11,94,215,0.7);
        color:#fff;
        border-bottom-right-radius:2px;
        flex-direction: row-reverse;
    }

    /* Avatars */
    .message img {
        width:36px;
        height:36px;
        border-radius:50%;
    }

    /* Text inside bubble */
    .message .text {
        word-wrap: break-word;
    }

    /* Typing indicator */
    #typing {
        font-style:italic;
        font-size:14px;
        color:#ccc;
        margin:5px 0;
    }

    /* Input area */
    .input-area {
        display:flex;
        padding:15px 20px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        border-top:1px solid rgba(255,255,255,0.1);
        gap:10px;
        margin:0 15px 15px 15px;
        border-radius:30px;
    }

    input {
        flex:1;
        padding:14px 18px;
        border-radius:30px;
        border:none;
        outline:none;
        font-size:15px;
        background: rgba(255,255,255,0.05);
        color:#fff;
    }

    input::placeholder { color:#aaa; }

    button {
        padding:0 25px;
        border-radius:30px;
        border:none;
        background: linear-gradient(90deg,#003366,#0055a5);
        color:white;
        font-weight:500;
        cursor:pointer;
        transition:all 0.3s ease;
    }

    button:hover { background: linear-gradient(90deg,#0055a5,#003366); }

    /* Scrollbar */
    .chat-area::-webkit-scrollbar { width:6px; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius:3px; }

    /* Onboarding Overlay */
    #onboarding {
        position:fixed; 
        top:0; 
        left:0; 
        width:100%; 
        height:100%; 
        background: rgba(0,0,0,0.8); 
        display:flex; 
        flex-direction:column; 
        justify-content:center; 
        align-items:center; 
        z-index:1000;
    }
    #onboarding-content {
        background: rgba(255,255,255,0.05); 
        padding:30px; 
        border-radius:15px; 
        backdrop-filter:blur(10px); 
        text-align:center; 
        width:90%; 
        max-width:400px;
    }
    #onboarding-content input {
        margin-top:15px;
        width:80%;
    }
    #genderSelection {
        margin-top:20px;
        display:none;
    }
    #genderSelection p {
        margin-bottom:10px;
    }
    #genderSelection button {
        margin:5px;
        padding:8px 20px;
        border-radius:20px;
        border:none;
        cursor:pointer;
        background: linear-gradient(90deg,#003366,#0055a5);
        color:#fff;
    }
  </style>
</head>
<body>

<!-- Onboarding Overlay -->
<div id="onboarding">
  <div id="onboarding-content">
    <h2>Welcome to AlphaBot!</h2>
    <input type="text" id="username" placeholder="Enter your name" />
    <div id="genderSelection">
      <p>Select your gender:</p>
      <button onclick="selectGender('male')">Male</button>
      <button onclick="selectGender('female')">Female</button>
    </div>
    <button id="nextButton" style="margin-top:15px; padding:10px 20px; border-radius:20px; border:none; background: linear-gradient(90deg,#003366,#0055a5); color:white; cursor:pointer;" onclick="nextStep()">Next</button>
  </div>
</div>

<!-- Main Chat UI -->
<div class="header">
  <img src="{{ url_for('static', filename='img/alphabot_logo.png') }}" alt="AlphaBot">
  AlphaBot — NAUB Student Assistant
</div>

<div id="chat" class="chat-area"></div>
<div id="typing" style="display:none;">AlphaBot is typing...</div>

<div class="input-area">
    <input id="msg" type="text" placeholder="Ask AlphaBot a question..." autofocus>
    <button onclick="sendMessage()">Send</button>
</div>

<script>
  let userName = '';
  let userGender = '';
  const userAvatarMale = "https://i.imgur.com/your-male-avatar.png"; // Replace with your chosen male avatar URL
  const userAvatarFemale = "https://i.imgur.com/your-female-avatar.png"; // Replace with your chosen female avatar URL
  const botAvatar = "{{ url_for('static', filename='img/alphabot_logo.png') }}";

  function nextStep() {
    const nameInput = document.getElementById('username');
    if (nameInput.value.trim() !== '') {
      userName = nameInput.value.trim();
      document.getElementById('nextButton').style.display = 'none';
      nameInput.style.display = 'none';
      document.getElementById('genderSelection').style.display = 'block';
    } else {
      alert('Please enter your name.');
    }
  }

  function selectGender(gender) {
    userGender = gender;
    // Hide onboarding overlay
    document.getElementById('onboarding').style.display = 'none';
    // Focus on chat input
    document.getElementById('msg').focus();
  }

  function addMessage(text, cls) {
    const msg = document.createElement("div");
    msg.className = "message " + cls;

    const avatar = document.createElement("img");
    avatar.src = cls === "user" ? (userGender === 'male' ? userAvatarMale : userAvatarFemale) : botAvatar;

    const textDiv = document.createElement("div");
    textDiv.className = "text";
    textDiv.innerHTML = "<b>" + (cls === "user" ? userName + ":" : "AlphaBot:") + "</b> " + text;

    msg.appendChild(avatar);
    msg.appendChild(textDiv);

    document.getElementById("chat").appendChild(msg);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
  }

  function sendMessage() {
    const msgInput = document.getElementById("msg");
    const text = msgInput.value.trim();
    if (!text) return;

    addMessage(text, "user");
    msgInput.value = "";
    typing.style.display = "block";

    fetch("/get", {
      method: "POST",
      headers: {"Content-Type":"application/x-www-form-urlencoded"},
      body: "msg=" + encodeURIComponent(text)
    })
    .then(res => res.json())
    .then(data => {
      typing.style.display = "none";
      const response = data.response;

      let i = 0;
      const interval = setInterval(() => {
        if (i < response.length) {
          if (!chat.lastChild || !chat.lastChild.classList.contains("bot")) {
            addMessage("", "bot");
          }
          chat.lastChild.querySelector(".text").innerHTML = "<b>AlphaBot:</b> " + response.substring(0, i + 1);
          i++;
          chat.scrollTop = chat.scrollHeight;
        } else {
          clearInterval(interval);
        }
      }, 20);
    });
  }
</script>

</body>
</html>
