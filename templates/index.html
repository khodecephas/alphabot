<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlphaBot — NAUB Student Assistant</title>
<link rel="icon" href="{{ url_for('static', filename='img/alphabot_logo.png') }}" type="image/png">

<style>
:root {
  --bg-gradient: linear-gradient(135deg, #0F0C29, #302B63, #24243E);
  --bot-border: #A78BFA;
  --user-border: #34D399;
  --button-gradient: linear-gradient(90deg, #A78BFA, #34D399);
  --text-color: #EDEDED;
  --accent: #B0B0B0;
  --white: #FFF;
  --glass-bg: rgba(255, 255, 255, 0.05);
}

/* Reset */
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg-gradient);
    height:100vh;
    display:flex;
    flex-direction:column;
    color: var(--text-color);
}

/* Header */
.header {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    padding: 20px;
    font-size:26px;
    font-weight:700;
    border-bottom:1px solid rgba(255,255,255,0.1);
    border-radius:0 0 15px 15px;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.header img { height:50px; }

/* Chat area */
.chat-area {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    margin: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.25);
}

/* Message bubble */
.message {
    display: flex;
    align-items: flex-start;
    padding: 12px 18px;
    border-radius: 20px;
    font-size: 16px;
    line-height: 1.4;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 0.3s forwards;
    backdrop-filter: blur(5px);
    background: rgba(255,255,255,0.05);
    max-width: 60%;       /* keeps bubble width reasonable */
}

/* Bot bubble - stick to left */
.bot {
    border-left: 3px solid var(--bot-border);
    flex-direction: row;
    align-self: flex-start; /* sticks to left */
}

/* User bubble - stick to right */
.user {
    border-right: 3px solid var(--user-border);
    flex-direction: row-reverse;
    align-self: flex-end;   /* sticks to right */
}

/* Avatar inside message */
.message img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--white);
}
@keyframes fadeIn { to { opacity:1; transform:translateY(0); } }

/* Bot bubble */
.bot {
    border-left: 3px solid var(--bot-border);
    flex-direction:row;
}

/* User bubble */
.user {
    border-right: 3px solid var(--user-border);
    flex-direction: row-reverse;
}

/* Avatar */
.message img {
    width:40px;
    height:40px;
    border-radius:50%;
    border:2px solid var(--white);
}

/* Text */
.message .text { word-wrap: break-word; }

/* Typing indicator */
#typing { font-style:italic; font-size:14px; color:var(--accent); margin:5px 0; }

/* Input area */
.input-area {
    display:flex;
    padding:15px 20px;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    border-top:1px solid rgba(255,255,255,0.1);
    gap:12px;
    margin:0 20px 20px 20px;
    border-radius:35px;
}
input {
    flex:1;
    padding:14px 18px;
    border-radius:30px;
    border:none;
    outline:none;
    font-size:16px;
    background: rgba(255,255,255,0.04);
    color: var(--text-color);
}
input::placeholder { color: var(--accent); }

button {
    padding:0 25px;
    border-radius:30px;
    border:none;
    background: var(--button-gradient);
    color: var(--white);
    font-weight:600;
    cursor:pointer;
    transition:all 0.3s ease;
}
button:hover { background: linear-gradient(90deg, #34D399, #A78BFA); }

/* Scrollbar */
.chat-area::-webkit-scrollbar { width:6px; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius:3px; }

/* Onboarding overlay */
#onboarding {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.85);
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    z-index:1000;
}
#onboarding-content {
    background: var(--glass-bg);
    padding:35px;
    border-radius:20px;
    backdrop-filter: blur(12px);
    text-align:center;
    width:90%; max-width:420px;
}
#genderSelection { margin-top:20px; display:none; }
#genderSelection button {
    margin:5px; padding:10px 22px; border-radius:20px;
    border:none; cursor:pointer;
    background: var(--button-gradient);
    color:var(--white);
    font-weight:600;
}
</style>
</head>
<body>

<div id="onboarding">
  <div id="onboarding-content">
    <h2>Welcome to AlphaBot!</h2>
    <input type="text" id="username" placeholder="Enter your name">
    
    <div id="genderSelection">
      <p>Select your gender:</p>
      <button onclick="selectGender('male')">Male</button>
      <button onclick="selectGender('female')">Female</button>
    </div>

    <!-- Bigger Next button centered below -->
    <button id="nextButton" onclick="nextStep()">Next</button>
  </div>
</div>

<style>
#onboarding-content {
  background: rgba(255, 255, 255, 0.05);
  padding: 35px;
  border-radius: 20px;
  backdrop-filter: blur(12px);
  text-align: center;
  width: 90%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 20px; /* spacing between input, gender, button */
}

#nextButton {
  margin-top: 20px;
  padding: 15px 30px;  /* bigger button */
  border-radius: 25px;
  border: none;
  font-size: 18px;     /* bigger font */
  font-weight: 700;
  background: linear-gradient(90deg, #A78BFA, #34D399); /* Web3 gradient */
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
}

#nextButton:hover {
  background: linear-gradient(90deg, #34D399, #A78BFA);
}
</style>

<!-- Header -->

  <div class="header">
  <img src="{{ url_for('static', filename='img/alphabot_logo.png') }}" alt="AlphaBot">
  AlphaBot — NAUB Student Assistant
  <button id="logoutBtn" onclick="logout()" style="
      margin-left:auto;
      padding:8px 16px;
      border-radius:20px;
      border:none;
      background: linear-gradient(90deg,#A78BFA,#34D399);
      color:white;
      font-weight:500;
      cursor:pointer;
      transition:0.3s;">Logout</button>
</div>


<!-- Chat -->
<div id="chat" class="chat-area"></div>
<div id="typing" style="display:none;">AlphaBot is typing...</div>

<!-- Input -->
<div class="input-area">
  <input id="msg" placeholder="Ask AlphaBot a question..." autofocus>
  <button onclick="sendMessage()">Send</button>
</div>

<script>
let userName='', userGender='';
const userAvatarMale="{{ url_for('static', filename='img/male_avatar.png') }}";
const userAvatarFemale="{{ url_for('static', filename='img/female_avatar.png') }}";
const botAvatar="{{ url_for('static', filename='img/alphabot_logo.png') }}";

function nextStep(){
    const name=document.getElementById('username');
    if(name.value.trim()!==''){
        userName=name.value.trim();
        document.getElementById('nextButton').style.display='none';
        name.style.display='none';
        document.getElementById('genderSelection').style.display='block';
    }else alert('Enter your name.');
}
function selectGender(g){ 
    userGender=g; 
    document.getElementById('onboarding').style.display='none'; 
    document.getElementById('msg').focus(); 
}
function addMessage(txt, cls){
    const msg=document.createElement("div"); msg.className="message "+cls;
    const avatar=document.createElement("img"); avatar.src=cls==="user"? (userGender==='male'?userAvatarMale:userAvatarFemale):botAvatar;
    const textDiv=document.createElement("div"); textDiv.className="text"; textDiv.innerHTML="<b>"+(cls==="user"?userName+":":"AlphaBot:")+"</b> "+txt;
    msg.appendChild(avatar); msg.appendChild(textDiv);
    document.getElementById("chat").appendChild(msg);
    document.getElementById("chat").scrollTop=document.getElementById("chat").scrollHeight;
}
function sendMessage(){
    const msgInput=document.getElementById("msg"); 
    const text=msgInput.value.trim(); if(!text) return;
    addMessage(text,"user"); 
    msgInput.value="";
    typing.style.display="block";
    fetch("/get",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"msg="+encodeURIComponent(text)})
    .then(res=>res.json()).then(data=>{
        typing.style.display="none"; 
        const response=data.response;
        let i=0; 
        const interval=setInterval(()=>{
            if(i<response.length){
                if(!chat.lastChild||!chat.lastChild.classList.contains("bot")) addMessage("", "bot");
                chat.lastChild.querySelector(".text").innerHTML="<b>AlphaBot:</b> "+response.substring(0,i+1); 
                i++;
                chat.scrollTop=chat.scrollHeight;
            } else clearInterval(interval);
        },20);
    });

    
}

function logout() {
    // Clear chat
    document.getElementById("chat").innerHTML = "";
    document.getElementById("msg").value = "";

    // Reset user info
    userName = '';
    userGender = '';

    // Show onboarding overlay again
    document.getElementById("onboarding").style.display = "flex";

    // Reset input and button
    document.getElementById("username").style.display = "block";
    document.getElementById("username").value = "";
    document.getElementById("nextButton").style.display = "block";
    document.getElementById("genderSelection").style.display = "none";

    // Focus username input
    document.getElementById("username").focus();
}
</script>
</body>
</html>
